api:
  dashboard: true
  insecure: true

log:
  level: info

accessLog: {}

entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
  https:
    address: ":443"

serversTransport:
  insecureSkipVerify: true

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: adguard_network
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: youremail@gmail.com
      storage: acme.json
      httpChallenge:
        entryPoint: http
      dnsChallenge:
        provider: ddnsgeek
